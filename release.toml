allow-branch = ["main"]
push-remote = "origin"
push = true
tag = true
publish = false
consolidate-commits = true
pre-release-commit-message = "chore(release): bump version"
tag-name = "v{{version}}"
tag-message = "Release {{version}}"
pre-release-hook = ["cargo", "generate-lockfile"]
pre-release-replacements = [
  { file = "alchemrs-py/Cargo.toml", search = '^version = "[^"]+"$', replace = 'version = "{{version}}"'},
  { file = "pyproject.toml", search = '^version = "[^"]+"$', replace = 'version = "{{version}}"'},
]
