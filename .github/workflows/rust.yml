name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: rust-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: 1.94.0
        components: rustfmt
    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
    - name: Check formatting
      run: cargo fmt --check

  clippy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: 1.94.0
        components: clippy
    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
    - name: Run Clippy
      run: cargo clippy --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: 1.94.0
    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
    - name: Run tests
      run: cargo test

  msrv:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: 1.85.0
    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
    - name: Run MSRV tests
      run: cargo test --locked

  python:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: 1.94.0
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: "pip"
    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: python-bindings
    - name: Install Python test dependencies
      run: python -m pip install --upgrade pip maturin pytest openmm
    - name: Install Python package
      run: maturin develop --locked
    - name: Run Python tests
      run: python -m pytest python/tests -q
