name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Validate release tag matches Cargo.toml
        id: meta
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          python - <<'PY' "$tag" >> "$GITHUB_OUTPUT"
          import re
          import sys
          import tomllib

          tag = sys.argv[1]
          if not re.fullmatch(r"v\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?", tag):
              raise SystemExit(f"tag '{tag}' is not a supported semantic version tag")

          with open("Cargo.toml", "rb") as fh:
              version = tomllib.load(fh)["package"]["version"]

          if f"v{version}" != tag:
              raise SystemExit(
                  f"release tag '{tag}' does not match Cargo.toml version 'v{version}'"
              )

          print(f"tag={tag}")
          print(f"version={version}")
          PY

      - name: Run tests
        run: cargo test --locked

      - name: Run Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

  build:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            binary_name: alchemrs
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            binary_name: alchemrs.exe
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            binary_name: alchemrs

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package Unix archive
        if: runner.os != 'Windows'
        id: package_unix
        shell: bash
        run: |
          archive="alchemrs-${{ needs.validate.outputs.tag }}-${{ matrix.target }}.${{ matrix.archive_ext }}"
          mkdir dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" dist/
          cp README.md LICENSE-MIT LICENSE-APACHE dist/
          tar -czf "$archive" -C dist "${{ matrix.binary_name }}" README.md LICENSE-MIT LICENSE-APACHE
          echo "archive=$archive" >> "$GITHUB_OUTPUT"

      - name: Package Windows archive
        if: runner.os == 'Windows'
        id: package_windows
        shell: pwsh
        run: |
          $archive = "alchemrs-${{ needs.validate.outputs.tag }}-${{ matrix.target }}.${{ matrix.archive_ext }}"
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.binary_name }}"
          Copy-Item README.md, LICENSE-MIT, LICENSE-APACHE dist/
          Compress-Archive -Path dist/* -DestinationPath $archive -Force
          "archive=$archive" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: ${{ steps.package_unix.outputs.archive || steps.package_windows.outputs.archive }}

  publish:
    needs:
      - validate
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          generate_release_notes: true
          files: release-assets/*
